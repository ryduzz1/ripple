<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ripple</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body tabindex="-1">
    <input id="keySink" class="key-sink" type="text" aria-hidden="true" tabindex="0" autocomplete="off" spellcheck="false" readonly />
    <div class="shell shell-enter">
      <main class="panel-shell">
        <div class="timeline-frame" tabindex="0">
          <div class="ruler" id="timeRuler"></div>
          <div class="playhead-line" id="playheadLine" aria-hidden="true"></div>
          <button class="playhead-handle" id="playheadHandle" type="button" aria-label="Drag playhead"></button>
          <div id="snapGuide" class="snap-guide hidden"></div>
          <div id="layerList" class="layer-list"></div>
          <div id="emptyState" class="empty-state">
            <h3 id="emptyTitle">Open a comp to build the timeline.</h3>
            <p id="emptyMessage">Ripple reads the active composition and turns AE layers into cleaner editorial lanes.</p>
          </div>
        </div>

        <aside class="side-toolbar" aria-label="Timeline tools">
          <button id="splitAtPlayhead" class="icon-button active-tool" aria-label="Split at playhead" title="Split at playhead (S)">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 8l6-6" />
              <path d="M14 16l6 6" />
              <path d="M8.5 9.5a3.5 3.5 0 1 1-2.5-6" />
              <path d="M8.5 14.5a3.5 3.5 0 1 0-2.5 6" />
              <path d="M8.5 9.5L20 2" />
              <path d="M8.5 14.5L20 22" />
            </svg>
          </button>
          <button class="icon-button" data-command="trimStartToPlayhead" aria-label="Trim in to playhead" title="Trim in to playhead ([)">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 4v16" />
              <path d="M18 7H9" />
              <path d="M12 4L9 7l3 3" />
              <path d="M18 17H9" />
            </svg>
          </button>
          <button class="icon-button" data-command="trimEndToPlayhead" aria-label="Trim out to playhead" title="Trim out to playhead (])">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 4v16" />
              <path d="M6 7h9" />
              <path d="M12 4l3 3-3 3" />
              <path d="M6 17h9" />
            </svg>
          </button>
          <div class="side-toolbar-spacer"></div>
          <button id="refreshComp" class="icon-button" aria-label="Refresh active comp" title="Refresh active comp">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 6v5h-5" />
              <path d="M4 18v-5h5" />
              <path d="M18 10a6.5 6.5 0 0 0-11-3l-3 3" />
              <path d="M6 14a6.5 6.5 0 0 0 11 3l3-3" />
            </svg>
          </button>
          <button id="openSettings" class="icon-button" aria-label="Timeline settings" title="Timeline settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2.05 2.05 0 0 1-2.9 2.9l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.02 1.56V21a2.05 2.05 0 0 1-4.1 0v-.09a1.7 1.7 0 0 0-1.02-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2.05 2.05 0 0 1-2.9-2.9l.06-.06A1.7 1.7 0 0 0 4.4 15a1.7 1.7 0 0 0-1.56-1.02H2.75a2.05 2.05 0 0 1 0-4.1h.09A1.7 1.7 0 0 0 4.4 8.86a1.7 1.7 0 0 0-.34-1.87L4 6.93a2.05 2.05 0 0 1 2.9-2.9l.06.06a1.7 1.7 0 0 0 1.87.34 1.7 1.7 0 0 0 1.02-1.56V2.8a2.05 2.05 0 0 1 4.1 0v.09a1.7 1.7 0 0 0 1.02 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2.05 2.05 0 0 1 2.9 2.9l-.06.06a1.7 1.7 0 0 0-.34 1.87 1.7 1.7 0 0 0 1.56 1.02h.09a2.05 2.05 0 0 1 0 4.1h-.09A1.7 1.7 0 0 0 19.4 15Z" />
            </svg>
          </button>
        </aside>

      </main>
    </div>

    <div id="settingsOverlay" class="overlay hidden">
      <div id="settingsBackdrop" class="overlay-backdrop"></div>
      <section class="settings-sheet">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Display</p>
            <h2>Timeline Settings</h2>
          </div>
          <button id="closeSettings" class="icon-button" aria-label="Close settings">×</button>
        </div>
        <div class="field-stack">
          <label class="checkbox-field">
            <input id="showMuted" type="checkbox" checked />
            <span>Show disabled and muted layers</span>
          </label>
          <label class="checkbox-field">
            <input id="showBadges" type="checkbox" checked />
            <span>Show layer type badges</span>
          </label>
          <label class="checkbox-field">
            <input id="compactRows" type="checkbox" />
            <span>Use compact layer rows</span>
          </label>
          <label class="checkbox-field">
            <input id="enableSnapping" type="checkbox" checked />
            <span>Enable snapping</span>
          </label>
        </div>
      </section>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <div id="toolTip" class="tool-tip hidden" role="tooltip"></div>
    <div id="dragReadout" class="drag-readout hidden" aria-hidden="true"></div>
    <div id="marquee" class="marquee hidden" aria-hidden="true"></div>

    <script src="./app.js"></script>
  </body>
</html>
